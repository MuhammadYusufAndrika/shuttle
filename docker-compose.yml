services:
  # ── PHP-FPM (Laravel App + Reverb) ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shuttle_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
    depends_on:
      - mysql
      - redis
    networks:
      - shuttle_net

  # ── Laravel Reverb WebSocket ───────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shuttle_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - shuttle_net

  # ── Laravel Queue Worker ───────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shuttle_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - shuttle_net

  # ── MySQL 8.0 ──────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: shuttle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rahasia123}
      MYSQL_DATABASE: ${DB_DATABASE:-shuttle_dahana}
      MYSQL_USER: ${DB_USERNAME:-shuttle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rahasia123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # expose on 3307 to avoid conflict
    networks:
      - shuttle_net

  # ── Redis (Queue + Cache) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shuttle_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - shuttle_net

  # ── Nginx (Reverse Proxy) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shuttle_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certs:/etc/nginx/certs   # self-signed certs untuk intranet
    depends_on:
      - app
    networks:
      - shuttle_net

networks:
  shuttle_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
